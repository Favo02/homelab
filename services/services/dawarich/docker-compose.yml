services:

  dawarich_app:
    image: freikin/dawarich:latest
    container_name: service-dawarich-app
    restart: unless-stopped
    volumes:
      - './dawarich-public-data:/var/app/public'
      - './dawarich-watched-data:/var/app/tmp/imports/watched'
      - './dawarich-storage-data:/var/app/storage'
      - './dawarich-db-data:/dawarich_db_data'
    # connection is permitted only through reverse proxy
    # ports:
    #   - 55555:3000
    environment:
      - RAILS_ENV=development
      - REDIS_URL=redis://dawarich_redis:6379
      - DATABASE_PORT=5432
      - DATABASE_HOST=dawarich_db
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - APPLICATION_HOSTS=${APPLICATION_HOSTS}
      - TIME_ZONE=${TZ}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    entrypoint: web-entrypoint.sh
    command: ['bin/rails', 'server', '-p', '3000', '-b', '::']
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO - http://127.0.0.1:3000/api/v1/health | grep -q '\"status\"\\s*:\\s*\"ok\"'" ]
    depends_on:
      - dawarich_db
      - dawarich_redis
    networks:
      - default
      - traefik_proxy14
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=traefik_proxy14'
      - 'traefik.http.routers.service-dawarich.rule=Host(`dawarich.favo02.dev`)'
      - 'traefik.http.services.service-dawarich.loadbalancer.server.port=3000'
      - 'traefik.http.routers.service-dawarich.entrypoints=webs-in,webs-ex'
      - 'traefik.http.routers.service-dawarich.tls.certresolver=letsencrypt'

  dawarich_redis:
    image: redis:7.4-alpine
    container_name: service-dawarich-redis
    restart: unless-stopped
    networks:
      - default
    volumes:
      - './dawarich-shared-data:/data'
    command: redis-server
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]

  dawarich_db:
    image: postgis/postgis:17-3.5-alpine
    container_name: service-dawarich-db
    restart: unless-stopped
    shm_size: 1G
    volumes:
      - './dawarich-db-data:/var/lib/postgresql/data'
      - './dawarich-shared-data:/var/shared'
    networks:
      - default
    environment:
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}" ]

  dawarich_sidekiq:
    image: freikin/dawarich:latest
    container_name: service-dawarich-sidekiq
    restart: unless-stopped
    volumes:
      - './dawarich-public-data:/var/app/public'
      - './dawarich-watched-data:/var/app/tmp/imports/watched'
      - './dawarich-storage-data:/var/app/storage'
    networks:
      - default
    environment:
      - RAILS_ENV=development
      - REDIS_URL=redis://dawarich_redis:6379
      - DATABASE_HOST=dawarich_db
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - APPLICATION_HOSTS=${APPLICATION_HOSTS}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    entrypoint: sidekiq-entrypoint.sh
    command: ['sidekiq']
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f sidekiq" ]
    depends_on:
      - dawarich_db
      - dawarich_redis
      - dawarich_app

networks:
  dawarich:
  traefik_proxy14:
    external: true
